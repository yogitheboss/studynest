name: Deploy Backend to Cloud Run

# Auto-deploys the server/ backend whenever it changes on master.
# Also runnable manually from the Actions tab (workflow_dispatch).
on:
  push:
    branches: [master]
    paths:
      - "server/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  PROJECT_ID: infohub-500010
  REGION: us-central1
  SERVICE: studynest-server
  IMAGE: gcr.io/infohub-500010/studynest-server

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation (OIDC)
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: projects/965726690144/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@infohub-500010.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      # Build the image from the server/ directory using Cloud Build.
      - name: Build & push image
        run: gcloud builds submit server --tag "${IMAGE}:${{ github.sha }}"

      # Deploy the new image. Env vars and secrets already configured on the
      # service are preserved — only the image changes.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "${IMAGE}:${{ github.sha }}" \
            --region "$REGION" \
            --quiet
